[colors.primary]
background = '{{colors.background.default.hex}}'
foreground = '{{colors.on_surface.default.hex}}'
 
[colors.cursor]
text = '{{colors.on_surface.default.hex}}'
cursor = '{{colors.on_surface_variant.default.hex}}' 
[colors.search.matches]
foreground = '{{colors.surface_variant.default.hex}}' 
background = '{{colors.tertiary.default.hex}}' 
 
[colors.search.focused_match]
foreground = '{{colors.surface_variant.default.hex}}' 
background = '{{colors.primary.default.hex}}' 
 
[colors.footer_bar]
foreground = '{{colors.surface_variant.default.hex}}' 
background = '{{colors.on_surface.default.hex}}' 
 
[colors.hints.start]
foreground = '{{colors.surface_variant.default.hex}}' 
background = '{{colors.secondary.default.hex}}' 
 
[colors.hints.end]
foreground = '{{colors.surface_variant.default.hex}}' 
background = '{{colors.secondary.default.hex}}' 
 
[colors.selection]
text = '{{colors.background.default.hex}}'
background = '{{colors.primary.default.hex}}'

 

[colors.normal]
black   = '{{ colors.surface_variant.default.hex }}'
red     = '{{ colors.error.default.hex | lighten: -10 }}'
green   = '{{ colors.secondary.default.hex  }}'
yellow  = '{{ colors.tertiary.default.hex | lighten: -5 }}'
blue    = '{{ colors.primary.default.hex }}'
magenta = '#cc92a1'
cyan    = '{{ colors.primary.default.hex | lighten: -10 }}'
white   = '{{ colors.inverse_surface.default.hex }}'

# Bright colors (same as normal colors)
[colors.bright]
black   = '{{ colors.outline.default.hex }}'
red     = '{{ colors.error.default.hex | lighten: -10 }}'
green   = '{{ colors.secondary.default.hex  }}'
yellow  = '{{ colors.tertiary.default.hex | lighten: -5 }}'
blue    = '{{ colors.primary.default.hex }}'
magenta = '#cc92a1'
cyan    = '{{ colors.primary.default.hex | lighten: -10 }}'
white   = '{{ colors.inverse_surface.default.hex }}'

